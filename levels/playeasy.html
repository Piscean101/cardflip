<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../main.css"/>
    <script src="../main.js" type="module"></script>
    <title>5x5</title>
</head>
<body id="boardPageBg">

    <button id="backHome">&lt; Back</button>

    <table id="boardContainer">

        <tr id="boardRow">
            <td id="board" colspan="3">
                <button id="startBtn">START!</button>
            </td>
        </tr>
<!-- 
        <tr id="board">
            <td id="cluePanel" class="gameUI">CLUE PANEL</td>
            <td id="cardPanel" class="gameUI">CARD PANEL<div id="cardCount">CARD COUNT</div></td>
            <td id="countPanel" class="gameUI">COUNT PANEL</td>
        </tr> -->

        <tr id="controlPanel">
            <td id="cluePanel" class="gameUI" title="Click to reveal a card!">CLUE PANEL</td>
            <td id="cardPanel" class="gameUI"></td>
            <td id="countPanel" class="gameUI">
                <span id="countReminderContainer" class="reminder"><span id="countNumer">0</span>/<span id="countDenom">0</span><br>matches found</span>
                <h1 id="flipCount">0</h1>
                <span id="flipReminder" class="reminder">flip(s) left</span>
            </td>
        </tr>

        <tr id="clockPanel">
            <td id="clock" colspan="3">
                <span id="clockBody"><span id="minutes">01</span>:<span id="seconds">00</span></span>
            </td>
        </tr>

    </table>

</body>
</html>
